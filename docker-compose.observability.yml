services:
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    ports:
      - "9115:9115"
    volumes:
      - ./observability/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@db:5432/tic_tac_toe?sslmode=disable

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: redis://redis:6379

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"

  alertmanager:
    image: prom/alertmanager:latest
    env_file:
      - ./env/monitoring.env
    entrypoint:
      - /bin/sh
      - -c
    command:
      - /bin/sh /etc/alertmanager/render-alertmanager-config.sh > /tmp/alertmanager.yml && exec /bin/alertmanager --config.file=/tmp/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ./scripts/render-alertmanager-config.sh:/etc/alertmanager/render-alertmanager-config.sh:ro

volumes:
  prometheus-data:
  grafana-data:
