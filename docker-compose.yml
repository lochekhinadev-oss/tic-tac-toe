x-backend-env: &backend-env
  - ./env/common.env
  - ./env/auth.env
  - ./env/backend.env

x-cleanup-env: &cleanup-env
  - ./env/common.env
  - ./env/cleanup.env

x-seed-env: &seed-env
  - ./env/common.env
  - ./env/seed.env

x-db-env: &db-env
  - ./env/db.env

services:
  backend:
    build:
      context: .
      dockerfile: backend/tic-tac-toe/cmd/app/Dockerfile
    env_file: *backend-env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

  seed:
    build:
      context: .
      dockerfile: workers/seed/Dockerfile
    env_file: *seed-env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed
    restart: "no"

  cleanup:
    build:
      context: .
      dockerfile: workers/cleanup/Dockerfile
    env_file: *cleanup-env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9091:9091"
    expose:
      - "9091"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5


  db:
    image: postgres:16-alpine
    env_file: *db-env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      - frontend
      - backend
    ports:
      - "3000:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
