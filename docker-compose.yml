services:
  backend:
    build:
      context: .
      dockerfile: backend/tic-tac-toe/cmd/app/Dockerfile
    env_file:
      - ./env/backend.env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - ./secrets/jwt:/app/secrets/jwt:ro

  seed:
    build:
      context: .
      dockerfile: workers/seed/Dockerfile
    env_file:
      - ./env/seed.env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed
    restart: "no"

  cleanup:
    build:
      context: .
      dockerfile: workers/cleanup/Dockerfile
    env_file:
      - ./env/cleanup.env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9091"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - ./env/db.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "80"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      - frontend
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
