services:
  backend:
    build:
      context: .
      dockerfile: backend/tic-tac-toe/cmd/app/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-tic_tac_toe}?sslmode=disable
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-./secrets/jwt/private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-./secrets/jwt/public.pem}
      JWT_PREVIOUS_PUBLIC_KEYS: ${JWT_PREVIOUS_PUBLIC_KEYS:-}
      JWT_KEY_ID: ${JWT_KEY_ID:-tic-tac-toe-main}
      JWT_ISSUER: ${JWT_ISSUER:-tic-tac-toe}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-tic-tac-toe-api}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}
    ports:
      - "8080:8080"
    volumes:
      - ./secrets/jwt:/app/secrets/jwt:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tic_tac_toe}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tic_tac_toe"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
