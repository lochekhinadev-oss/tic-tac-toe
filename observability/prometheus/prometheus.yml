global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  - job_name: cleanup
    metrics_path: /metrics
    static_configs:
      - targets:
          - cleanup:9091

  - job_name: postgres-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - https://gateway:443/tic-tac-toe/healthz
          - https://gateway:443/tic-tac-toe/readyz
          - https://gateway:443/tic-tac-toe/frontend-healthz
          - http://backend:8080/healthz
          - http://backend:8080/readyz
          - http://cleanup:9091/healthz
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - target_label: service
        replacement: healthcheck
