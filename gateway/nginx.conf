resolver 127.0.0.11 valid=10s ipv6=off;

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

upstream frontend_upstream {
    zone frontend_upstream 64k;
    server frontend:80 resolve;
    keepalive 32;
}

upstream backend_upstream {
    zone backend_upstream 64k;
    server backend:8080 resolve;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/tic-tac-toe.crt;
    ssl_certificate_key /etc/nginx/certs/tic-tac-toe.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = / {
        return 308 /tic-tac-toe/;
    }

    location = /tic-tac-toe {
        return 308 /tic-tac-toe/;
    }

    location = /tic-tac-toe/healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /tic-tac-toe/swagger {
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/swagger;
    }

    location = /tic-tac-toe/openapi.yaml {
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/openapi.yaml;
    }

    location = /tic-tac-toe/swagger/doc.json {
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/swagger/doc.json;
    }

    location = /tic-tac-toe/games {
        limit_req zone=api_limit burst=20 nodelay;
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/games;
    }

    location ^~ /tic-tac-toe/games/ {
        limit_req zone=api_limit burst=20 nodelay;
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/games/;
    }

    location = /tic-tac-toe/users {
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/users;
    }

    location ^~ /tic-tac-toe/users/ {
        limit_req zone=api_limit burst=20 nodelay;
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/users/;
    }

    location = /tic-tac-toe/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/auth;
    }

    location ^~ /tic-tac-toe/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/auth/;
    }

    location = /tic-tac-toe/signup {
        limit_req zone=auth_limit burst=5 nodelay;
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://backend_upstream/signup;
    }

    location ^~ /tic-tac-toe/ {
        include /etc/nginx/conf.d/proxy_headers.conf;
        proxy_pass http://frontend_upstream/;
    }
}
